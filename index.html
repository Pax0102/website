<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugo's hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
    font-family: Arial, sans-serif;
}

.tituloInicio2 {
    position: fixed;
    font-family: ClashGrotesk-Variable, Satoshi-Variable, Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-size: 2.5rem;
    letter-spacing: -0.4px;
    color: rgb(255, 255, 255);
    text-align: center;
    font-weight: 540;
    margin: 0px;
    white-space: pre-line;
}

.tituloInicio {
    font-family: Arial, Helvetica, sans-serif;
    font-size: x-large;
    position: fixed;
    left: 50px;
    color: #d4d4d8;
}

/* MENU CONTAINER */
.menu {
    position: fixed;
    top: 15px;
    right: 15px;

    background: rgba(30, 30, 30, 0.6);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    gap: 4px;
    padding: 4px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
}

/* LINK BUTTON */
.link {
    position: relative;
    width: 42px;      /* smaller */
    height: 42px;     /* smaller */
    border-radius: 16px;
    text-decoration: none;
    color: #d4d4d8;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                background 0.3s ease,
                color 0.3s ease;
}

/* ICON */
.icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: left 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-size: 16px;  /* smaller */
}

/* LABEL */
.label {
    position: absolute;
    top: 50%;
    left: 44px;
    transform: translateY(-50%);
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.25s ease;
    font-weight: 500;
    font-size: 13px;  /* smaller */
    color: #f4f4f5;
}

/* HOVER */
.link:hover {
    width: 110px;   /* smaller expansion */
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
}

.link:hover .icon {
    left: 22px;
    transform: translateY(-50%);
}

.link:hover .label {
    opacity: 1;
}

/* ACTIVE */
.link.active {
    background: #272525;
    color: #000000;
}

.link.active .label {
    color: #ffffff;
}
</style>
</head>
<body>
    <h4 class="tituloInicio">Inicio</h4>
    <h1 class="tituloInicio2">TaaaI</h1>

<div class="menu">
    <a href="#" class="link active">
        <div class="icon">🏠</div>
        <div class="label"> Inicio</div>
    </a>
    <a href="#" class="link">
        <div class="icon">🔍</div>
        <div class="label"> Procurar</div>
    </a>
    <a href="#" class="link">
        <div class="icon">❤️</div>
        <div class="label"> Favoritos</div>
    </a>
    <a href="#" class="link">
        <div class="icon">⚙️</div>
        <div class="label"> Config</div>
    </a>
</div>

</body>
</html>
