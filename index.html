<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugo's hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* HEADER */
header {
    background-color: #0c0c0cd3;
    height: 150px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    border-bottom: 3px solid #3b82f6;
}

.card {
    width: 400px;
    background: #1e1e1e;
    border-radius: 20px;
    overflow: hidden;
    margin: 60px auto;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.05);
}

/* IMAGEM TOPO */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    transform: scaleY(1.1); /* cresce só verticalmente */
    transform-origin: top;  /* cresce para baixo */
}

/* CONTEUDO */
.card-content {
    padding: 25px;
    color: #e4e4e7;
}

/* LINHA COM TEXTO NO MEIO */
.separator {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 20px 0;
    color: #9ca3af;
    font-size: 14px;
}

.separator::before,
.separator::after {
    content: "";
    flex: 1;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.separator::before {
    margin-right: 10px;
}

.separator::after {
    margin-left: 10px;
}


/* TITULO GRANDE */
.tituloInicio2 {
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

    text-shadow: 
        2px 2px 4px rgba(0,0,0,0.7),
        0px 0px 8px rgba(255, 255, 255, 0.219);
    letter-spacing: -0.4px;
    color: rgb(255, 255, 255);
    font-weight: 540;
    margin: 0;
    margin-left: 7px;
}

/* TITULO MENOR (AGORA MAIOR) */
.tituloInicio {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.5rem; /* AUMENTADO */
    color: #d4d4d8;
    margin: 0;
    margin-bottom: 8px
}

/* BODY */
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
    font-family: Arial, sans-serif;
}

/* MENU CONTAINER */
.menu {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(30, 30, 30, 0.6);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    gap: 4px;
    padding: 4px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
}

/* LINK BUTTON */
.link {
    position: relative;
    width: 42px;
    height: 42px;
    border-radius: 16px;
    text-decoration: none;
    color: #d4d4d8;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                background 0.3s ease,
                color 0.3s ease;
}

/* ICON */
.icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: left 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-size: 16px;
}

/* LABEL */
.label {
    position: absolute;
    top: 50%;
    left: 44px;
    transform: translateY(-50%);
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.25s ease;
    font-weight: 500;
    font-size: 13px;
    color: #f4f4f5;
}

/* HOVER */
.link:hover {
    width: 110px;
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
}

.link:hover .icon {
    left: 22px;
    transform: translateY(-50%);
}

.link:hover .label {
    opacity: 1;
}

/* ACTIVE */
.link.active {
    background: #272525;
    color: #000000;
}

.link.active .label {
    color: #ffffff;
}
</style>
</head>

<body>

<header>
    <div class="header-box">
        <div class="headerdiv">
            <h4 class="tituloInicio">Inicio</h4>
            <h1 class="tituloInicio2">Bem vindo, Hugo's hub a sua disponibilidade</h1>
        </div>
    </div>
</header>

<div class="menu">
    <a href="#" class="link active">
        <div class="icon">🏠</div>
        <div class="label">Inicio</div>
    </a>
    <a href="#" class="link">
        <div class="icon">🔍</div>
        <div class="label">Procurar</div>
    </a>
    <a href="#" class="link">
        <div class="icon">❤️</div>
        <div class="label">Favoritos</div>
    </a>
    <a href="#" class="link">
        <div class="icon">⚙️</div>
        <div class="label">Config</div>
    </a>
</div>

<div class="card">
    <img src="https://picsum.photos/600/400" alt="Imagem exemplo">

    <div class="card-content">
        <h2>Título do Card</h2>

        <div class="separator">Informações</div>

        <p>
            Este é um exemplo de texto dentro da caixa. 
            Você pode colocar descrição, botões ou qualquer conteúdo aqui.
        </p>
    </div>
</div>

</body>
</html>
